name: CI - Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake ninja-build libboost-all-dev libpq-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DUSE_GURUX=OFF
      - name: Build
        run: cmake --build build --config Release
      - name: Run unit tests (if exist)
        run: |
          if [ -f build/CTestTestfile.cmake ]; then
            cmake --build build --target test || true
          fi
